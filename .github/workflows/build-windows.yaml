name: Build Windows (Manual)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag or release name to assign to this build'
        required: true
        default: 'windows-test-build'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CUDA_COMPUTE_CAP: 75

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '13.1.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "crt", "thrust", "nvvm", "cublas", "cublas_dev", "cufft", "cufft_dev", "curand", "curand_dev", "nvrtc", "nvrtc_dev"]'
          log-file-suffix: 'windows-latest.txt'

      - name: Install MSVC Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: bun install

      - name: Install trusted-signing-cli
        shell: bash
        run: |
          curl -fsSL "https://github.com/Levminer/trusted-signing-cli/releases/download/0.8.0/trusted-signing-cli.exe" -o "$RUNNER_TEMP/trusted-signing-cli.exe"
          printf '%s\n' "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/trusted-signing-cli.exe" --version

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx @tauri-apps/cli
          tagName: ${{ github.event.inputs.tag_name }}
          releaseName: ${{ github.event.inputs.tag_name }}
          releaseBody: "Automated manual Windows build triggered from GitHub Actions."
          releaseDraft: false
          prerelease: true
          args: ''
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          uploadPlainBinary: true
