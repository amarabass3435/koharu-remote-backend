name: Build Windows (Manual)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag or release name to assign to this build'
        required: true
        default: 'windows-test-build'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CUDA_COMPUTE_CAP: 75

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '13.1.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "crt", "thrust", "nvvm", "cublas", "cublas_dev", "cufft", "cufft_dev", "curand", "curand_dev", "nvrtc", "nvrtc_dev"]'
          log-file-suffix: 'windows-latest.txt'

      - name: Install MSVC Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-binary"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install dependencies
        run: bun install


      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx @tauri-apps/cli
          tagName: ${{ github.event.inputs.tag_name }}
          releaseName: ${{ github.event.inputs.tag_name }}
          releaseBody: "Automated manual Windows build triggered from GitHub Actions."
          releaseDraft: false
          prerelease: true
          args: ''
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          uploadPlainBinary: true
